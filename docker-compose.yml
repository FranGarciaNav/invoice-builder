# Two-container setup built from this repository.
# Start: docker compose up --build -d

services:
  backend:
    image: invoice-builder:local
    build: .
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: invoice-builder-backend
    # backend internal-only, works only via nginx
    # ports:
    #   - '3000:3000'
    environment:
      - SERVICE=backend
      - NODE_ENV=docker
      - DB_DIRECTORY=/data
      # Backend webserver port
      - PORT=3000
      # Backend webserver host
      - DEV_SERVER_URL=0.0.0.0
      # Frontend webserver URL
      - FE_SERVER_URL=http://localhost:3001
      # Path to migration files in docker volume
      - MIGRATIONS_PATH=/app/dist-be/backend/server/shared/migrations
    volumes:
      - app-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const net=require('net');const c=net.createConnection(3000,'localhost');c.on('connect',()=>{c.destroy();process.exit(0)});c.on('error',()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    image: invoice-builder:local
    build: .
    container_name: invoice-builder-frontend
    ports:
      - '3001:3001'
    environment:
      - SERVICE=frontend
      # nginx inside the container proxies /api/* here;
      # 'backend' resolves to the backend container via Docker's internal DNS.
      - BACKEND_HOST=backend
      - BACKEND_PORT=3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app-data:
